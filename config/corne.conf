# Enable deep sleep support (default: no)
CONFIG_ZMK_SLEEP=y

# Increase the keyboard's wireless range (default: no)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Global debounce time for key press/release (defaults: -1/-1, typeractive presets: 1/10)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable the general pointing/mouse functionality
CONFIG_ZMK_POINTING=y

# Enable ZMK Studio for realtime keymap updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
