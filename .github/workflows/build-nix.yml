name: Build ZMK firmware (nix)
on:
  workflow_dispatch:
  push:
    paths:
      - config/**
      - build.yaml

jobs:
  build:
    uses: urob/zmk-actions/.github/workflows/build-user-config.yml@main
    with:
      # Set to 'gnuarmemb' 'zephyr' or 'zephyr-full' (from fastest to
      # most compatible). ZMK Studio requires 'zephyr-full'.
      # NOTE: temporarily pinned to 'zephyr' because the 'zephyr-full'
      # Python env in urob/zmk-actions@v10.0.0 currently fails to build
      # due to a spsdk-mcu-link / hidapi version mismatch in the pinned
      # nixpkgs. Revert to 'zephyr-full' once the upstream flake is
      # updated.
      toolchain: zephyr
